<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABchat</title>
    <link rel="stylesheet" href="home_style.css">
</head>

<body>
    <div id="top_ribbon">
        <img src="pic.png" alt="logo" id="logo">
        <label id="username">Username</label>
        <a href="" id="feedback">Feedback</a>
    </div>
    <div id="wrapper">

        <div id="people">
            <div id="people_top_ribbon">
            <label id="chat_label">Chats</label>
            </div>
            <div id="people_names">
                <label>people names</label>
            </div>
        </div>

        <div id="chat_wrapper">
            <div id="chat_ribbon">
                <label id="client2">Client2</label>
            </div>
            <div id="chat_window">
                <label for="">chat window</label><br>
            </div>
            <div id="message_box">
                <input type="text" value="message" id= "message_bar">
            </div>
        </div>
    </div>
    <script src="home_sript.js"></script>
</body>

</html>
