<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JABchat</title>
    <link rel="stylesheet" href="login_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barrio&family=Bitcount:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- <h1 id = "login_heading">Login</h1><br> -->
    <div id="wrapper">
        <div id="login_page_div">
            <img src="pic.png" alt="logo" id="logo"><br>
            <div class="rl_button">
                <button id="toggle_login">Login</button>
                <button id="toggle_register">Sign up</button>
            </div>
            <img src="login.png" alt="profile" id="login_img">
            <input type="text" , value="username" , id="username_input"><br>
            <input type="text" , value="password" , id="password_input"><br>
            <button id="login_button">Login</button><br>
            <!-- <div id = create_account>
            <label id = "create_account_label">Don't have an account?</label>
            <a href="" id = "create_account_link">Create One</a>
        </div> -->
        </div>

        <div id="description_wrapper_div">
            <div id=video_div><video src="login_vid.mp4" width="550" autoplay muted loop id="login_vid"></video></div>
            <div id="description">
                <h1 id="heading">Welcome User.</h1>
                <label id="line1">JABchat is a super secure chatting platform.</label><br>
                <label id="line2">Using JABchat, users on the same subnet can chat freely.</label>
            </div>
        </div>
    </div>
    <script src="index_script.js"></script>
</body>

</html>
